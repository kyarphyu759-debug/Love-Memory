<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Love Memory V6</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui;background:linear-gradient(135deg,#ff758c,#ff7eb3);color:#fff}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:rgba(255,255,255,.12);backdrop-filter:blur(10px)}
.row{display:flex;justify-content:center;align-items:center;padding:60px 10px 20px;gap:14px}
.card{background:rgba(255,255,255,.15);border-radius:22px;padding:12px;text-align:center;backdrop-filter:blur(10px)}
.profile{width:36%}.center{width:28%}
.profile img{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #fff}
.modal,.menu{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);justify-content:center;align-items:center}
.sheet,.box{background:#fff;color:#222;border-radius:20px;padding:18px;width:92%;max-width:420px}
input,select,button{width:100%;padding:12px;margin-top:8px}
.colors{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.color{height:40px;border-radius:10px;cursor:pointer}
.counter{position:fixed;bottom:10px;left:10px;right:10px;text-align:center;background:rgba(255,255,255,.18);padding:16px;border-radius:18px;font-size:28px;font-weight:700;backdrop-filter:blur(10px)}
</style></head><body>

<div class="topbar">
<b>❤️ Love Memory</b>
<button onclick="openMenu()" style="padding:8px 12px;font-size:14px;width:auto">Edit ⚙️</button>
</div>

<div class="row">
<div class="card profile" onclick="editProfile(1)">
<div style="font-size:22px">💖</div><img id="img1" src="https://via.placeholder.com/90"><h3 id="name1">Partner 1</h3><p id="info1"></p>
</div>

<div class="card center">
<div style="font-size:20px">❤️</div><div id="ann">2024-01-01</div>
<h1 id="days">0</h1><small>Days Together</small>
</div>

<div class="card profile" onclick="editProfile(2)">
<div style="font-size:22px">💖</div><img id="img2" src="https://via.placeholder.com/90"><h3 id="name2">Partner 2</h3><p id="info2"></p>
</div>
</div>

<div class="counter" id="liveCounter"></div>

<div id="profileModal" class="modal"><div class="sheet">
<h3>Edit Profile</h3>
<input id="pname" placeholder="Name">
<select id="pgender"><option>Male</option><option>Female</option></select>
<input id="pdob" type="date">
<input id="pimg" type="file" accept="image/*">
<button onclick="saveProfile()">Save</button>
<button onclick="closeProfile()">Close</button>
</div></div>

<div id="menu" class="menu"><div class="box">
<h3>Edit Options</h3>
<button onclick="openAnniversaryEditor()">Change Anniversary Date</button>
<button onclick="openBackgroundPicker()">Change Background</button>
<button onclick="closeMenu()">Close</button>
</div></div>

<div id="annModal" class="modal"><div class="box">
<h3>Change Anniversary Date</h3>
<input id="annInput" type="date">
<button onclick="saveAnniversary()">Save Date</button>
</div></div>

<div id="bgModal" class="modal"><div class="box">
<h3>Choose Background</h3>
<div class="colors">
<div class="color" style="background:#ff758c" onclick="setColor('#ff758c')"></div>
<div class="color" style="background:#8e44ad" onclick="setColor('#8e44ad')"></div>
<div class="color" style="background:#3498db" onclick="setColor('#3498db')"></div>
<div class="color" style="background:#16a085" onclick="setColor('#16a085')"></div>
<div class="color" style="background:#f39c12" onclick="setColor('#f39c12')"></div>
<div class="color" style="background:#e74c3c" onclick="setColor('#e74c3c')"></div>
<div class="color" style="background:#2c3e50" onclick="setColor('#2c3e50')"></div>
</div>
<button onclick="uploadBackground()">Use My Photo</button>
<button onclick="bgModal.style.display='none'">Close</button>
</div></div>

<script>
let current=1;
let data=JSON.parse(localStorage.getItem('love_v6')||'{"anniversary":"2024-01-01"}');
function age(d){if(!d)return '';let b=new Date(d),t=new Date();let a=t.getFullYear()-b.getFullYear();if(t.getMonth()<b.getMonth()||(t.getMonth()==b.getMonth()&&t.getDate()<b.getDate()))a--;return a;}
function save(){localStorage.setItem('love_v6',JSON.stringify(data));render();}
function render(){
name1.textContent=data.name1||'Partner 1';name2.textContent=data.name2||'Partner 2';
info1.textContent=(data.gender1||'')+' '+(data.dob1?('• '+age(data.dob1)+' yrs'):''); 
info2.textContent=(data.gender2||'')+' '+(data.dob2?('• '+age(data.dob2)+' yrs'):'');
if(data.img1)img1.src=data.img1;if(data.img2)img2.src=data.img2;
ann.textContent=data.anniversary;
days.textContent=Math.floor((Date.now()-new Date(data.anniversary))/86400000);
}
function editProfile(n){current=n;profileModal.style.display='flex';}
function closeProfile(){profileModal.style.display='none';}
function saveProfile(){
data['name'+current]=pname.value;data['gender'+current]=pgender.value;data['dob'+current]=pdob.value;
let f=pimg.files[0]; if(f){let r=new FileReader();r.onload=e=>{data['img'+current]=e.target.result;save();};r.readAsDataURL(f);} else save();
closeProfile();
}
function openMenu(){menu.style.display='flex'} function closeMenu(){menu.style.display='none'}
function openAnniversaryEditor(){menu.style.display='none';annModal.style.display='flex';annInput.value=data.anniversary||'';}
function saveAnniversary(){data.anniversary=annInput.value;save();annModal.style.display='none';}
function openBackgroundPicker(){menu.style.display='none';bgModal.style.display='flex';}
function setColor(c){document.body.style.background=c;localStorage.setItem('bgcolor',c);bgModal.style.display='none';}
function uploadBackground(){let i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=e=>{let r=new FileReader();r.onload=x=>{document.body.style.backgroundImage=`url(${x.target.result})`;document.body.style.backgroundSize='cover';document.body.style.backgroundRepeat='no-repeat';document.body.style.backgroundPosition='center center';document.body.style.backgroundAttachment='fixed';localStorage.setItem('bgimg',x.target.result);};r.readAsDataURL(e.target.files[0]);};i.click();}
function updateCounter(){
let start=new Date(data.anniversary);
let now=new Date();

let years=now.getFullYear()-start.getFullYear();
let months=now.getMonth()-start.getMonth();
let days=now.getDate()-start.getDate();

if(days<0){
 let prevMonth=new Date(now.getFullYear(),now.getMonth(),0);
 days+=prevMonth.getDate();
 months--;
}
if(months<0){
 months+=12;
 years--;
}

let diffMs=now-start;
let hrs=Math.floor(diffMs/(1000*60*60))%24;
let mins=Math.floor(diffMs/(1000*60))%60;
let secs=Math.floor(diffMs/1000)%60;

liveCounter.innerHTML=`❤️ ${years}Y &nbsp; 💖 ${months}M <br>💝 ${days}D &nbsp; 💓 ${hrs}H &nbsp; 💞 ${mins}M &nbsp; 💗 ${secs}S`;
}
let c=localStorage.getItem('bgcolor'); if(c) document.body.style.background=c;
let i=localStorage.getItem('bgimg'); if(i){document.body.style.backgroundImage=`url(${i})`;document.body.style.backgroundSize='cover';document.body.style.backgroundRepeat='no-repeat';document.body.style.backgroundPosition='center center';document.body.style.backgroundAttachment='fixed';}
render(); setInterval(updateCounter,1000);
</script></body></html>
